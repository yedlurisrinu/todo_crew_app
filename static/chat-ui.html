<!-- A web page, it is functional and not tested thoroughly; can open from any web browser and start chatting or call at
http://localhost:8000, it communicates to API at this address
 -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Task Assistant</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:        #0d0f12;
      --surface:   #151820;
      --border:    #252932;
      --accent:    #00e5a0;
      --accent2:   #0088ff;
      --user-bg:   #1a2235;
      --bot-bg:    #131a14;
      --text:      #e8eaf0;
      --muted:     #5a6070;
      --danger:    #ff4560;
      --mono:      'IBM Plex Mono', monospace;
      --sans:      'Syne', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Noise overlay ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    /* ── Header ── */
    header {
      position: relative;
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 18px 28px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }

    .logo-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 10px var(--accent), 0 0 20px var(--accent);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.6; transform: scale(0.85); }
    }

    .header-title {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text);
    }

    .header-sub {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
      margin-left: auto;
    }

    .status-pill {
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--accent);
      background: rgba(0,229,160,0.08);
      border: 1px solid rgba(0,229,160,0.2);
      border-radius: 20px;
      padding: 4px 10px;
    }

    .status-pill.ended {
      color: var(--danger);
      background: rgba(255,69,96,0.08);
      border-color: rgba(255,69,96,0.2);
    }

    /* ── Chat window ── */
    #chat-window {
      position: relative;
      z-index: 1;
      flex: 1;
      overflow-y: auto;
      padding: 28px 20px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      scroll-behavior: smooth;
    }

    #chat-window::-webkit-scrollbar { width: 4px; }
    #chat-window::-webkit-scrollbar-track { background: transparent; }
    #chat-window::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    /* ── Messages ── */
    .message-row {
      display: flex;
      gap: 12px;
      max-width: 820px;
      width: 100%;
      animation: fadeUp 0.3s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .message-row.user { margin-left: auto; flex-direction: row-reverse; }
    .message-row.bot  { margin-right: auto; }

    .avatar {
      width: 32px; height: 32px;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px;
      font-weight: 700;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .message-row.user .avatar {
      background: linear-gradient(135deg, var(--accent2), #00c8ff);
      color: #fff;
    }

    .message-row.bot .avatar {
      background: linear-gradient(135deg, var(--accent), #00b87a);
      color: #000;
    }

    .bubble {
      padding: 13px 18px;
      border-radius: 14px;
      font-size: 14px;
      line-height: 1.65;
      max-width: calc(100% - 50px);
      position: relative;
    }

    .message-row.user .bubble {
      background: var(--user-bg);
      border: 1px solid rgba(0,136,255,0.25);
      border-top-right-radius: 4px;
      color: #c8d8f8;
      font-family: var(--mono);
      font-size: 13px;
    }

    .message-row.bot .bubble {
      background: var(--bot-bg);
      border: 1px solid rgba(0,229,160,0.15);
      border-top-left-radius: 4px;
    }

    /* Formatted response rendering */
    .bubble h1, .bubble h2, .bubble h3 {
      font-family: var(--sans);
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 8px;
      margin-top: 12px;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .bubble h1:first-child,
    .bubble h2:first-child,
    .bubble h3:first-child { margin-top: 0; }

    .bubble p { margin-bottom: 8px; }
    .bubble p:last-child { margin-bottom: 0; }

    .bubble ul, .bubble ol {
      padding-left: 20px;
      margin-bottom: 8px;
    }

    .bubble li { margin-bottom: 4px; }

    .bubble code {
      font-family: var(--mono);
      font-size: 12px;
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1px 6px;
      color: var(--accent);
    }

    .bubble pre {
      background: rgba(0,0,0,0.4);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 14px;
      overflow-x: auto;
      margin: 8px 0;
    }

    .bubble pre code {
      background: none;
      border: none;
      padding: 0;
      color: #a8d8a0;
      font-size: 12px;
    }

    .bubble strong { color: #fff; font-weight: 600; }
    .bubble em { color: #aaa; font-style: italic; }

    .timestamp {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted);
      margin-top: 5px;
      text-align: right;
    }

    .message-row.bot .timestamp { text-align: left; }

    /* ── Typing indicator ── */
    .typing-indicator {
      display: flex;
      gap: 5px;
      align-items: center;
      padding: 14px 18px;
    }

    .typing-indicator span {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--accent);
      animation: bounce 1.2s ease-in-out infinite;
    }

    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0.7); opacity: 0.4; }
      40%           { transform: scale(1);   opacity: 1; }
    }

    /* ── Session ended ── */
    .session-end-banner {
      text-align: center;
      font-family: var(--mono);
      font-size: 12px;
      color: var(--danger);
      padding: 10px 20px;
      border: 1px solid rgba(255,69,96,0.2);
      border-radius: 8px;
      background: rgba(255,69,96,0.05);
      max-width: 340px;
      margin: 0 auto;
      animation: fadeUp 0.3s ease both;
    }

    /* ── System message ── */
    .system-msg {
      text-align: center;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
      padding: 6px 0;
      animation: fadeUp 0.3s ease both;
    }

    /* ── Input area ── */
    #input-area {
      position: relative;
      z-index: 10;
      padding: 16px 20px 20px;
      background: var(--surface);
      border-top: 1px solid var(--border);
    }

    .input-wrapper {
      display: flex;
      gap: 10px;
      align-items: flex-end;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 10px 10px 10px 18px;
      transition: border-color 0.2s;
    }

    .input-wrapper:focus-within {
      border-color: rgba(0,229,160,0.4);
      box-shadow: 0 0 0 3px rgba(0,229,160,0.06);
    }

    .input-wrapper.disabled {
      opacity: 0.4;
      pointer-events: none;
    }

    #user-input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: var(--text);
      font-family: var(--mono);
      font-size: 13px;
      resize: none;
      max-height: 120px;
      min-height: 24px;
      line-height: 1.6;
      padding: 2px 0;
    }

    #user-input::placeholder {
      color: var(--muted);
    }

    #send-btn {
      width: 40px; height: 40px;
      border-radius: 10px;
      border: none;
      background: var(--accent);
      color: #000;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s, transform 0.1s, box-shadow 0.2s;
      font-size: 16px;
    }

    #send-btn:hover {
      background: #00ffb3;
      box-shadow: 0 0 16px rgba(0,229,160,0.4);
      transform: scale(1.04);
    }

    #send-btn:active { transform: scale(0.96); }

    #send-btn:disabled {
      background: var(--border);
      color: var(--muted);
      cursor: not-allowed;
      box-shadow: none;
      transform: none;
    }

    .input-hint {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted);
      margin-top: 8px;
      padding-left: 4px;
    }

    /* ── Error bubble ── */
    .error-bubble {
      background: rgba(255,69,96,0.08) !important;
      border-color: rgba(255,69,96,0.3) !important;
      color: #ff8fa0 !important;
    }

    /* ── Empty state ── */
    #empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      opacity: 0.35;
      pointer-events: none;
    }

    .empty-icon { font-size: 40px; }
    .empty-text {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--muted);
      text-align: center;
      line-height: 1.8;
    }
  </style>
</head>
<body>

<!-- Header -->
<header>
  <div class="logo-dot"></div>
  <span class="header-title">Task Assistant</span>
  <span class="header-sub">endpoint → /todos</span>
  <div class="status-pill" id="status-pill">
    <span>●</span> SESSION ACTIVE
  </div>
</header>

<!-- Chat window -->
<div id="chat-window">
  <div id="empty-state">
    <div class="empty-icon">⌨</div>
    <div class="empty-text">Type a task below and press Enter or Send.<br>Type <strong>bye</strong> to end the session.</div>
  </div>
</div>

<!-- Input area -->
<div id="input-area">
  <div class="input-wrapper" id="input-wrapper">
    <textarea
      id="user-input"
      placeholder="Describe your task…  (Enter to send, Shift+Enter for newline)"
      rows="1"
      autocomplete="off"
      spellcheck="false"
    ></textarea>
    <button id="send-btn" title="Send (Enter)">
      &#9658;
    </button>
  </div>
  <div class="input-hint">Press <kbd>Enter</kbd> to send &nbsp;·&nbsp; <kbd>Shift+Enter</kbd> for new line &nbsp;·&nbsp; Type <kbd>bye</kbd> to end session</div>
</div>

<script>
  // ── State ──────────────────────────────────────────────
  const API_URL = 'http://127.0.0.1:8000/todos';
  let sessionActive = true;
  let messageCount  = 0;

  // ── DOM refs ───────────────────────────────────────────
  const chatWindow   = document.getElementById('chat-window');
  const userInput    = document.getElementById('user-input');
  const sendBtn      = document.getElementById('send-btn');
  const statusPill   = document.getElementById('status-pill');
  const inputWrapper = document.getElementById('input-wrapper');
  const emptyState   = document.getElementById('empty-state');

  // ── Auto-resize textarea ───────────────────────────────
  userInput.addEventListener('input', () => {
    userInput.style.height = 'auto';
    userInput.style.height = Math.min(userInput.scrollHeight, 120) + 'px';
  });

  // ── Keyboard handler ───────────────────────────────────
  userInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      handleSend();
    }
  });

  sendBtn.addEventListener('click', handleSend);

  // ── Helpers ────────────────────────────────────────────
  function getTime() {
    return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }

  function hideEmptyState() {
    if (emptyState) emptyState.remove();
  }

  function scrollBottom() {
    chatWindow.scrollTo({ top: chatWindow.scrollHeight, behavior: 'smooth' });
  }

  // ── Render user bubble ─────────────────────────────────
  function appendUserMessage(text) {
    hideEmptyState();
    const row = document.createElement('div');
    row.className = 'message-row user';
    row.innerHTML = `
      <div>
        <div class="bubble">${escapeHtml(text)}</div>
        <div class="timestamp">${getTime()}</div>
      </div>
      <div class="avatar">U</div>
    `;
    chatWindow.appendChild(row);
    scrollBottom();
  }

  // ── Render bot bubble ──────────────────────────────────
  function appendBotMessage(content, isError = false) {
    const row = document.createElement('div');
    row.className = 'message-row bot';
    const formatted = isError ? `<p>${escapeHtml(content)}</p>` : formatResponse(content);
    row.innerHTML = `
      <div class="avatar">AI</div>
      <div>
        <div class="bubble ${isError ? 'error-bubble' : ''}">${formatted}</div>
        <div class="timestamp">${getTime()}</div>
      </div>
    `;
    chatWindow.appendChild(row);
    scrollBottom();
  }

  // ── Typing indicator ───────────────────────────────────
  function showTyping() {
    hideEmptyState();
    const row = document.createElement('div');
    row.className = 'message-row bot';
    row.id = 'typing-row';
    row.innerHTML = `
      <div class="avatar">AI</div>
      <div class="bubble">
        <div class="typing-indicator">
          <span></span><span></span><span></span>
        </div>
      </div>
    `;
    chatWindow.appendChild(row);
    scrollBottom();
  }

  function hideTyping() {
    const el = document.getElementById('typing-row');
    if (el) el.remove();
  }

  // ── System message ─────────────────────────────────────
  function appendSystemMsg(text) {
    const el = document.createElement('div');
    el.className = 'system-msg';
    el.textContent = text;
    chatWindow.appendChild(el);
    scrollBottom();
  }

  // ── End session ────────────────────────────────────────
  function endSession() {
    sessionActive = false;
    sendBtn.disabled = true;
    userInput.disabled = true;
    inputWrapper.classList.add('disabled');
    statusPill.className = 'status-pill ended';
    statusPill.innerHTML = '<span>●</span> SESSION ENDED';

    const banner = document.createElement('div');
    banner.className = 'session-end-banner';
    banner.textContent = '⏹ Session ended. Refresh the page to start a new session.';
    chatWindow.appendChild(banner);
    scrollBottom();
  }

  // ── Format API response ────────────────────────────────
  function formatResponse(data) {
    // If data is an object/array, pretty-print as structured HTML
    if (typeof data === 'object' && data !== null) {
      return renderObject(data);
    }

    // If string — apply markdown-like formatting
    if (typeof data === 'string') {
      return markdownToHtml(data);
    }

    return `<p>${escapeHtml(String(data))}</p>`;
  }

  function renderObject(obj) {
    if (Array.isArray(obj)) {
      if (obj.length === 0) return '<p><em>Empty list returned.</em></p>';
      const items = obj.map(item => {
        if (typeof item === 'object') {
          return `<li>${renderKeyValues(item)}</li>`;
        }
        return `<li>${escapeHtml(String(item))}</li>`;
      }).join('');
      return `<ul>${items}</ul>`;
    }

    // Plain object
    return renderKeyValues(obj);
  }

  function renderKeyValues(obj) {
    return Object.entries(obj).map(([k, v]) => {
      const key = `<strong>${escapeHtml(k)}:</strong>`;
      if (typeof v === 'object' && v !== null) {
        return `<p>${key}</p>${renderObject(v)}`;
      }
      return `<p>${key} ${escapeHtml(String(v))}</p>`;
    }).join('');
  }

  function markdownToHtml(text) {
    return text
      .replace(/```(\w*)\n?([\s\S]*?)```/g, '<pre><code>$2</code></pre>')
      .replace(/`([^`]+)`/g, '<code>$1</code>')
      .replace(/^### (.+)$/gm, '<h3>$1</h3>')
      .replace(/^## (.+)$/gm, '<h2>$1</h2>')
      .replace(/^# (.+)$/gm, '<h1>$1</h1>')
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.+?)\*/g, '<em>$1</em>')
      .replace(/^[-*] (.+)$/gm, '<li>$1</li>')
      .replace(/(<li>.*<\/li>)/gs, '<ul>$1</ul>')
      .replace(/\n{2,}/g, '</p><p>')
      .replace(/\n/g, '<br>')
      .replace(/^(?!<[hup])(.+)/, '<p>$1</p>');
  }

  function escapeHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  // ── Main send handler ──────────────────────────────────
  async function handleSend() {
    if (!sessionActive) return;

    const text = userInput.value.trim();
    if (!text) return;

    // Check for "bye"
    if (text.toLowerCase() === 'bye') {
      appendUserMessage(text);
      appendBotMessage('Goodbye! 👋 Have a great day. Your session has been ended.', false);
      endSession();
      return;
    }

    // Render user message
    appendUserMessage(text);
    userInput.value = '';
    userInput.style.height = 'auto';
    sendBtn.disabled = true;
    messageCount++;

    // Call API
    showTyping();

    try {
      const response = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ task_details: text })
      });

      hideTyping();

      if (!response.ok) {
        const errText = await response.text();
        appendBotMessage(`Error ${response.status}: ${errText || response.statusText}`, true);
      } else {
        const data = await response.json();
        appendBotMessage(data);
      }

    } catch (err) {
      hideTyping();
      if (err.name === 'TypeError' && err.message.includes('fetch')) {
        appendBotMessage('⚠️ Could not reach the server at ' + API_URL + '. Make sure your FastAPI server is running.', true);
      } else {
        appendBotMessage('⚠️ Unexpected error: ' + err.message, true);
      }
    } finally {
      if (sessionActive) {
        sendBtn.disabled = false;
        userInput.focus();
      }
    }
  }

  // ── Handle tab/window close ────────────────────────────
  window.addEventListener('beforeunload', () => {
    if (sessionActive) endSession();
  });

  // ── Focus on load ──────────────────────────────────────
  userInput.focus();
</script>
</body>
</html>
